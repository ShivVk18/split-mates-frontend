<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Primary Orange Gradient -->
    <linearGradient id="logoOrange" x1="10" y1="10" x2="50" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8D50" />
      <stop offset="100%" stop-color="#F95116" />
    </linearGradient>
    
    <!-- Secondary Dark/Slate Gradient -->
    <linearGradient id="logoSlate" x1="50" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Left S-Split Half (Orange) -->
  <path d="M 47 10 
           C 60 20, 60 40, 47 50 
           C 34 60, 34 80, 47 90 
           A 40 40 0 0 1 47 10 Z" 
        fill="url(#logoOrange)" />

  <!-- Right S-Split Half (Slate/Dark) -->
  <path d="M 53 10 
           C 66 20, 66 40, 53 50 
           C 40 60, 40 80, 53 90 
           A 40 40 0 0 0 53 10 Z" 
        fill="url(#logoSlate)" />
</svg>
